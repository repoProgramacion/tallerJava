<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz — Programación I · Taller 1 Java · POO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1a2236;
            --surface3: #0d1321;
            --border: #1e293b;
            --border-light: #2a3754;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --correct: #10b981;
            --correct-bg: rgba(16, 185, 129, 0.08);
            --correct-border: rgba(16, 185, 129, 0.3);
            --wrong: #ef4444;
            --wrong-bg: rgba(239, 68, 68, 0.08);
            --wrong-border: rgba(239, 68, 68, 0.3);
            --gold: #f59e0b;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
            --font: 'Outfit', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }

        /* HERO */
        .hero {
            position: relative;
            padding: 60px 24px 48px;
            text-align: center;
            overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute;
            top: -200px; left: 50%; transform: translateX(-50%);
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 60%);
            pointer-events: none;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--surface2); border: 1px solid var(--border);
            padding: 6px 16px; border-radius: 99px;
            font-size: 0.78rem; font-weight: 600; color: var(--accent);
            letter-spacing: 0.5px; margin-bottom: 20px; position: relative;
        }
        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 900; letter-spacing: -1px; line-height: 1.15;
            background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; position: relative; margin-bottom: 12px;
        }
        .hero-sub {
            font-size: 1.05rem; color: var(--text-dim);
            max-width: 620px; margin: 0 auto 28px; font-weight: 400;
        }

        /* SCORE BAR */
        .score-bar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 14, 26, 0.88);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex; align-items: center; justify-content: center;
            gap: 24px; flex-wrap: wrap;
        }
        .score-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 600; }
        .score-item .num { font-family: var(--mono); font-size: 1.1rem; }
        .score-item.correct .num { color: var(--correct); }
        .score-item.wrong .num { color: var(--wrong); }
        .score-item.pending .num { color: var(--text-muted); }
        .progress-track { width: 200px; height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--purple)); border-radius: 99px; transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1); }

        /* CONTAINER */
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 80px; position: relative; z-index: 1; }

        /* NAV DOTS */
        .nav-dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 32px; }
        .nav-dot {
            width: 34px; height: 34px; border-radius: 8px;
            background: var(--surface2); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
            cursor: pointer; transition: all 0.2s; font-family: var(--mono);
        }
        .nav-dot:hover { border-color: var(--accent); color: var(--accent); }
        .nav-dot.dot-correct { background: var(--correct); border-color: var(--correct); color: #fff; }
        .nav-dot.dot-wrong { background: var(--wrong); border-color: var(--wrong); color: #fff; }

        /* QUESTION CARD */
        .q-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            margin-bottom: 32px;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
            animation: fadeSlideIn 0.4s ease backwards;
        }
        .q-card:hover { border-color: rgba(59,130,246,0.15); }
        .q-card.answered-correct { border-color: var(--correct-border); box-shadow: 0 0 40px rgba(16,185,129,0.05); }
        .q-card.answered-wrong { border-color: var(--wrong-border); box-shadow: 0 0 40px rgba(239,68,68,0.05); }

        /* Header */
        .q-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap; gap: 12px;
        }
        .q-number { display: flex; align-items: center; gap: 12px; }
        .q-num-badge {
            width: 44px; height: 44px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1rem; color: #fff; flex-shrink: 0;
        }
        .q-topic { font-size: 0.84rem; font-weight: 700; color: var(--accent); }
        .q-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .q-tag {
            background: var(--surface2); border: 1px solid var(--border);
            padding: 4px 14px; border-radius: 99px;
            font-size: 0.75rem; font-weight: 700; color: var(--gold);
        }

        /* Body */
        .q-body { padding: 0 24px 24px; }

        /* SCENARIO */
        .scenario-section {
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 22px;
            margin: 20px 0;
        }
        .scenario-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.72rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1.2px; color: var(--text-muted); margin-bottom: 16px;
        }
        .scenario-label .icon-circle {
            width: 26px; height: 26px; border-radius: 6px;
            background: var(--surface2); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
        }
        .scenario-p {
            font-size: 0.92rem; line-height: 1.78; color: var(--text-dim);
            margin-bottom: 12px;
        }
        .scenario-p:last-child { margin-bottom: 0; }
        .scenario-p strong { color: var(--text); }
        .scenario-p em { color: var(--cyan); font-style: italic; }
        .scenario-p code {
            background: var(--surface2); padding: 2px 7px; border-radius: 4px;
            font-family: var(--mono); font-size: 0.82rem; color: var(--gold);
            border: 1px solid var(--border);
        }

        /* Code block */
        .code-block {
            background: #080c16;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin: 14px 0;
            overflow: hidden;
        }
        .code-label {
            padding: 8px 16px;
            font-family: var(--mono); font-size: 0.68rem;
            color: var(--text-muted); letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
        }
        .code-block pre {
            padding: 16px 18px;
            margin: 0;
            font-family: var(--mono); font-size: 0.82rem;
            line-height: 1.85; color: #c9d1d9;
            overflow-x: auto;
            white-space: pre;
        }

        /* Quote */
        .scenario-quote {
            background: var(--surface2);
            border-left: 4px solid var(--accent);
            border-radius: 0 10px 10px 0;
            padding: 14px 18px;
            margin: 14px 0;
        }
        .scenario-quote p {
            font-style: italic; font-size: 0.9rem;
            line-height: 1.7; color: var(--text-dim);
            margin: 0;
        }
        .scenario-quote p strong { color: var(--text); }
        .scenario-quote p em { color: var(--cyan); }
        .scenario-quote p code {
            background: var(--surface3); padding: 2px 6px; border-radius: 3px;
            font-family: var(--mono); font-size: 0.8rem; color: var(--gold);
        }
        .quote-author {
            margin-top: 8px; font-size: 0.78rem;
            color: var(--text-muted); font-weight: 600;
        }

        /* QUESTION TEXT */
        .q-question-section {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            border-radius: 12px; padding: 20px 22px;
            margin: 20px 0 8px;
        }
        .q-question-label {
            font-size: 0.7rem; font-weight: 700;
            color: rgba(255,255,255,0.4); text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 8px;
        }
        .q-text {
            font-size: 0.95rem; line-height: 1.75;
            color: #ffffff; font-weight: 500;
        }
        .q-text code {
            background: rgba(255,255,255,0.1); padding: 2px 7px;
            border-radius: 4px; font-family: var(--mono); font-size: 0.85rem;
        }
        .q-text strong { color: #fff; }
        .q-text em { color: var(--cyan); }

        /* HINT */
        .hint-toggle {
            display: inline-flex; align-items: center; gap: 6px;
            background: none; border: 1px solid rgba(245, 158, 11, 0.25);
            color: var(--gold); padding: 7px 16px; border-radius: 8px;
            font-size: 0.82rem; font-weight: 600; cursor: pointer;
            margin: 12px 0 16px; transition: all 0.2s; font-family: var(--font);
        }
        .hint-toggle:hover { background: rgba(245, 158, 11, 0.08); }
        .hint-content {
            display: none;
            background: rgba(245, 158, 11, 0.05);
            border: 1px solid rgba(245, 158, 11, 0.15);
            border-radius: 10px; padding: 14px 18px;
            margin-bottom: 16px; font-size: 0.88rem;
            color: #fbbf24; line-height: 1.65;
        }
        .hint-content.show { display: block; animation: fadeSlideIn 0.3s ease; }
        .hint-content code {
            background: rgba(245,158,11,0.12); padding: 1px 5px;
            border-radius: 3px; font-family: var(--mono); font-size: 0.8rem;
        }
        .hint-content strong { color: #fde68a; }
        .hint-content em { color: #fcd34d; font-style: italic; }

        /* OPTIONS */
        .options-list { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            display: flex; align-items: flex-start; gap: 14px;
            width: 100%; text-align: left;
            background: var(--surface2); border: 2px solid var(--border);
            border-radius: 12px; padding: 16px 18px;
            cursor: pointer; transition: all 0.2s;
            font-family: var(--font); color: var(--text);
        }
        .option-btn:hover:not(.disabled) {
            border-color: rgba(59,130,246,0.4);
            background: rgba(59,130,246,0.05);
        }
        .option-btn .letter-badge {
            width: 36px; height: 36px; border-radius: 8px;
            background: var(--surface); border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.92rem; color: var(--text-dim);
            flex-shrink: 0; transition: all 0.3s;
        }
        .option-btn .opt-text {
            font-size: 0.88rem; line-height: 1.7;
            color: var(--text-dim); padding-top: 5px; transition: color 0.3s;
        }
        .option-btn .opt-text code {
            background: var(--surface); padding: 1px 5px; border-radius: 3px;
            font-family: var(--mono); font-size: 0.8rem; color: var(--gold);
            border: 1px solid var(--border);
        }
        .option-btn .opt-text strong { color: var(--text); }
        .option-btn .opt-text em { color: var(--cyan); }
        .option-btn:hover:not(.disabled) .opt-text { color: var(--text); }

        /* Selected states */
        .option-btn.selected-correct { border-color: var(--correct); background: var(--correct-bg); }
        .option-btn.selected-correct .letter-badge { background: var(--correct); border-color: var(--correct); color: #fff; }
        .option-btn.selected-correct .opt-text { color: #6ee7b7; }

        .option-btn.selected-wrong { border-color: var(--wrong); background: var(--wrong-bg); }
        .option-btn.selected-wrong .letter-badge { background: var(--wrong); border-color: var(--wrong); color: #fff; }
        .option-btn.selected-wrong .opt-text { color: #fca5a5; }

        .option-btn.reveal-correct { border-color: var(--correct-border); background: var(--correct-bg); }
        .option-btn.reveal-correct .letter-badge { background: var(--correct); border-color: var(--correct); color: #fff; }

        .option-btn.disabled { cursor: default; opacity: 0.6; }
        .option-btn.disabled.selected-correct,
        .option-btn.disabled.selected-wrong,
        .option-btn.disabled.reveal-correct { opacity: 1; }

        /* FEEDBACK */
        .feedback-area { margin-top: 16px; }
        .get-feedback-btn {
            display: none;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: #fff; border: none; padding: 10px 24px;
            border-radius: 10px; font-size: 0.88rem; font-weight: 700;
            cursor: pointer; font-family: var(--font);
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .get-feedback-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--accent-glow); }
        .get-feedback-btn.show { display: inline-flex; align-items: center; gap: 8px; }

        .feedback {
            display: none; margin-top: 14px;
            border-radius: 12px; padding: 18px 20px;
            font-size: 0.88rem; line-height: 1.75;
            animation: fadeSlideIn 0.4s ease;
        }
        .feedback.show { display: block; }
        .feedback.correct-fb { background: var(--correct-bg); border: 1px solid var(--correct-border); color: #a7f3d0; }
        .feedback.wrong-fb { background: var(--wrong-bg); border: 1px solid var(--wrong-border); color: #fecaca; }
        .feedback-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .feedback.correct-fb .feedback-title { color: var(--correct); }
        .feedback.wrong-fb .feedback-title { color: var(--wrong); }
        .feedback strong { color: inherit; font-weight: 700; }
        .feedback hr { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 12px 0; }
        .feedback code {
            background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px;
            font-family: var(--mono); font-size: 0.8rem;
        }

        /* RESULTS */
        .results-card {
            display: none; background: var(--surface);
            border: 1px solid var(--border); border-radius: 18px;
            padding: 48px 40px; text-align: center; margin-top: 40px;
        }
        .results-card.show { display: block; animation: fadeSlideIn 0.5s ease; }
        .results-score {
            font-size: 4.5rem; font-weight: 900; font-family: var(--mono);
            background: linear-gradient(135deg, var(--correct), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .results-label { font-size: 1.1rem; color: var(--text-dim); margin-top: 4px; }
        .results-msg { margin-top: 16px; font-size: 1rem; color: var(--text); font-weight: 500; }
        .reset-btn {
            margin-top: 24px;
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); padding: 12px 32px; border-radius: 10px;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            font-family: var(--font); transition: all 0.2s;
        }
        .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .q-header { padding: 16px 16px 12px; }
            .q-body { padding: 0 16px 20px; }
            .scenario-section { padding: 16px; }
            .option-btn { padding: 12px 14px; gap: 10px; }
            .score-bar { gap: 12px; padding: 10px 16px; }
            .progress-track { width: 120px; }
            .code-block pre { font-size: 0.74rem; padding: 12px 14px; }
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-badge">☕ Java · POO · SENA 2026-I</div>
    <h1>Taller 1 — Programación I</h1>
    <p class="hero-sub">15 preguntas de selección múltiple con retroalimentación inmediata. Lee cada escenario, elige tu respuesta y aprende de la explicación.</p>
</div>

<div class="score-bar" id="scoreBar">
    <div class="score-item correct">✅ <span class="num" id="correctCount">0</span></div>
    <div class="score-item wrong">❌ <span class="num" id="wrongCount">0</span></div>
    <div class="score-item pending">⏳ <span class="num" id="pendingCount">15</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="container">
    <div class="nav-dots" id="navDots"></div>
    <div id="quizContainer"></div>
    <div class="results-card" id="resultsCard">
        <div class="results-score" id="finalScore">0/15</div>
        <div class="results-label">Puntuación Final</div>
        <div class="results-msg" id="resultsMsg"></div>
        <button class="reset-btn" onclick="resetQuiz()">🔄 Reiniciar Quiz</button>
    </div>
</div>

<script>
    const QUIZ_DATA = [{"number": 1, "topic": "Conceptos Fundamentales de POO", "scenario_paragraphs": ["El equipo de desarrollo de <strong>SaludApp</strong>, una startup de Armenia que gestiona historiales médicos de pacientes, lleva meses luchando con su código. Cada vez que necesitan agregar un nuevo tipo de usuario —médico, enfermero, administrador— tienen que copiar y pegar bloques enteros de código, cambiar nombres de variables manualmente y rezar para que nada se rompa.", "El líder técnico, cansado de los errores repetitivos, propone reescribir el sistema usando <strong>Programación Orientada a Objetos</strong>. En la reunión, explica al equipo júnior:", "\"La clave no es solo escribir código que funcione hoy. La POO nos permite <strong>modelar el mundo real como entidades con características y comportamientos propios</strong>, de modo que cuando el negocio cambie, el código pueda cambiar con él sin colapsar.\""], "code_blocks": [], "quote": "\"La clave no es solo escribir código que funcione hoy. La POO nos permite <strong>modelar el mundo real como entidades con características y comportamientos propios</strong>, de modo que cuando el negocio cambie, el código pueda cambiar con él sin colapsar.\"", "quote_author": "— Carlos, líder técnico de SaludApp", "question": "Considerando el problema que enfrenta SaludApp y la explicación del líder técnico, ¿cuál de las siguientes afirmaciones describe de manera más precisa el propósito central de la Programación Orientada a Objetos como paradigma de desarrollo?", "hint": "piensa en cómo los seres humanos clasificamos el mundo: un «médico» y un «paciente» son tipos diferentes de «persona», cada uno con datos y acciones propias. ¿Cómo captura eso la POO?", "options": [{"letter": "A", "text": "La POO es un paradigma que organiza el software en torno a <strong>objetos</strong>: entidades que combinan <em>datos</em> (atributos) y <em>comportamientos</em> (métodos) en una misma unidad. En lugar de pensar el programa como una secuencia de instrucciones, se modela el problema como un conjunto de entidades que interactúan entre sí, tal como ocurre en el mundo real. En SaludApp esto significa que <code>Medico</code>, <code>Paciente</code> y <code>Administrador</code> serían clases independientes con sus propios atributos (<code>nombre</code>, <code>especialidad</code>, <code>historialClinico</code>) y métodos (<code>agendarCita()</code>, <code>verHistorial()</code>), eliminando la necesidad de copiar y pegar código repetido.", "correct": true}, {"letter": "B", "text": "La POO es una técnica de optimización de memoria en la que el compilador de Java agrupa instrucciones relacionadas dentro de bloques <code>class</code> para reducir el uso del <em>heap</em>. Al declarar múltiples variables dentro de una misma clase, la JVM las almacena de forma contigua, evitando la fragmentación que ocurría en la programación procedural. En el caso de SaludApp, agrupar <code>nombre</code>, <code>edad</code> y <code>especialidad</code> en una clase <code>Medico</code> no implica un cambio de paradigma conceptual, sino simplemente una forma más eficiente de declarar variables relacionadas que el recolector de basura puede liberar en bloque cuando ya no se necesitan.", "correct": false}, {"letter": "C", "text": "La POO es esencialmente un estilo visual de escritura de código que surgió para facilitar la lectura en equipos grandes. Su aporte principal es estandarizar la <em>nomenclatura</em>: al forzar que cada entidad del sistema tenga un nombre en formato <code>PascalCase</code> y sus atributos en <code>camelCase</code>, cualquier desarrollador puede entender el código sin documentación adicional. El problema de SaludApp con el copy-paste sería resuelto adoptando una guía de estilo estricta y herramientas de <em>linting</em>, ya que lo que realmente genera caos en proyectos grandes es la inconsistencia en los nombres, no la ausencia de un paradigma de diseño estructural.", "correct": false}]}, {"number": 2, "topic": "La Máquina Virtual de Java — JVM", "scenario_paragraphs": ["El equipo de <strong>SaludApp</strong> acaba de terminar su primer módulo en Java. Andrés, uno de los desarrolladores júnior, compila el proyecto en su MacBook y genera el archivo <code>SaludApp.class</code>. Emocionado, le envía ese archivo por correo a su colega Diana, quien trabaja en un servidor Linux del hospital, y a Felipe, que usa Windows en casa.", "Para sorpresa de Andrés, <strong>los tres pueden ejecutar exactamente el mismo archivo</strong> sin recompilar ni modificar nada. Felipe recuerda entonces una frase que leyó en la documentación oficial de Java:", "\"Write once, run anywhere.\"", "Sin embargo, Valentina —la líder técnica— advierte: <em>\"Eso no significa que Java compile diferente para cada sistema. El secreto está en lo que pasa en el medio, entre el código fuente y el procesador.\"</em> El equipo queda intrigado. ¿Qué es ese elemento intermedio y cuál es su verdadero papel?"], "code_blocks": [], "quote": "\"Write once, run anywhere.\"", "quote_author": "— Documentación oficial de Java, Sun Microsystems (1995)", "question": "Considerando que el mismo archivo <code>.class</code> funciona en Mac, Linux y Windows sin recompilar, ¿cuál de las siguientes afirmaciones explica correctamente el papel de la JVM en este proceso y por qué es eso posible?", "hint": "el archivo <code>.class</code> no contiene instrucciones para el procesador de tu computadora. Contiene instrucciones para algo más.", "options": [{"letter": "A", "text": "La JVM actúa como un <strong>compilador cruzado multiplataforma</strong>: cuando Andrés ejecuta <code>javac</code> en su Mac, el compilador detecta automáticamente los tres sistemas operativos instalados en la red local y genera una versión del archivo <code>.class</code> optimizada para cada uno. Cuando Diana y Felipe reciben el archivo, su sistema operativo identifica la versión correspondiente y la ejecuta directamente sobre el hardware sin necesidad de ningún intermediario adicional. Esto explica por qué Java es más eficiente que lenguajes como C++, donde el desarrollador debe compilar manualmente para cada plataforma: el <em>toolchain</em> de Java automatiza ese proceso durante la compilación inicial, haciendo que el bytecode sea en realidad código máquina empaquetado de forma portable.", "correct": false}, {"letter": "B", "text": "Cuando Andrés compila con <code>javac</code>, el código fuente <code>.java</code> no se transforma en instrucciones nativas del procesador, sino en <strong>bytecode</strong>: un conjunto de instrucciones de nivel intermedio diseñadas específicamente para una máquina abstracta. Ese bytecode es el que queda en el archivo <code>.class</code>. La <strong>JVM</strong> es esa máquina abstracta: un programa instalado en el sistema operativo de Diana (Linux) y de Felipe (Windows) que sabe <em>leer e interpretar</em> el bytecode y traducirlo, en tiempo de ejecución, a las instrucciones nativas que entiende cada procesador. Por eso el mismo <code>.class</code> funciona en cualquier plataforma: el bytecode es siempre el mismo, pero cada JVM hace la traducción final según el hardware y sistema operativo donde corre.", "correct": true}, {"letter": "C", "text": "La portabilidad de Java se basa en que el sistema operativo —Linux, Windows o macOS— incluye de fábrica un módulo de compatibilidad binaria que reconoce el formato <code>.class</code> como un estándar abierto, similar a como todos los sistemas abren archivos <code>.pdf</code> o <code>.mp3</code>. La JVM es simplemente la <em>interfaz gráfica de administración</em> que permite al desarrollador monitorear en tiempo real el consumo de memoria y los hilos activos durante la ejecución, pero no participa directamente en la traducción de instrucciones. Esto significa que Diana y Felipe no necesitan tener ningún software adicional instalado: el kernel de Linux y el de Windows ya saben cómo interpretar bytecode de Java de forma nativa, del mismo modo que interpretan los formatos ejecutables propios de cada sistema (<code>.elf</code> y <code>.exe</code> respectivamente).", "correct": false}]}, {"number": 3, "topic": "Clases, Atributos y Métodos en Java", "scenario_paragraphs": ["El equipo de <strong>SaludApp</strong> ya decidió usar POO. Ahora Valentina, la líder técnica, les pide a los juniors que modelen la entidad más importante del sistema: el <strong>médico</strong>. Les dice:", "\"Antes de escribir una sola línea de código, piensen: ¿qué <em>información</em> necesitamos guardar de un médico? ¿Y qué <em>acciones</em> puede hacer? Esas son las dos preguntas que definen cualquier clase en Java.\"", "Andrés propone este código como punto de partida para discutir en el equipo:"], "code_blocks": [{"label": "Medico.java", "code": "public class Medico {\n\n    // ¿Qué es esto?\n    private String  nombre;\n    private String  especialidad;\n    private int     tarjetaProfesional;\n\n    // ¿Y esto?\n    public void agendarCita(String paciente) {\n        // lógica de agendamiento\n    }\n\n    public String getNombre() {\n        return nombre;\n    }\n}"}], "quote": "\"Antes de escribir una sola línea de código, piensen: ¿qué <em>información</em> necesitamos guardar de un médico? ¿Y qué <em>acciones</em> puede hacer? Esas son las dos preguntas que definen cualquier clase en Java.\"", "quote_author": "— Valentina, líder técnica de SaludApp", "question": "Analizando el código que propuso Andrés, ¿cuál de las siguientes afirmaciones describe correctamente la diferencia estructural entre lo que representa la <strong>clase</strong> <code>Medico</code>, sus <strong>atributos</strong> y sus <strong>métodos</strong>, y el rol que cada uno juega dentro del sistema de SaludApp?", "hint": "observa los dos comentarios en el código — <em>\"¿Qué es esto?\"</em> y <em>\"¿Y esto?\"</em>. Valentina los puso a propósito. La respuesta correcta distingue claramente qué papel cumple cada sección dentro de la clase y por qué esa separación es fundamental en POO.", "options": [{"letter": "A", "text": "La clase <code>Medico</code> es el objeto en sí: cada vez que el sistema necesita representar a un médico real del hospital, utiliza directamente esa clase. Los <strong>atributos</strong> (<code>nombre</code>, <code>especialidad</code>, <code>tarjetaProfesional</code>) y los <strong>métodos</strong> (<code>agendarCita()</code>, <code>getNombre()</code>) son en realidad la misma cosa desde el punto de vista de la JVM: ambos se almacenan en el <em>heap</em> como campos del objeto y se acceden mediante la referencia de instancia. La distinción sintáctica entre atributos y métodos es una convención de legibilidad que Java heredó de C++, pero en memoria no existe diferencia real entre un campo de datos y un bloque de instrucciones: ambos son fragmentos del mismo objeto almacenado en el <em>heap</em>. Por eso en el código de Andrés, tanto <code>nombre</code> como <code>agendarCita()</code> cumplen el mismo rol estructural dentro de <code>Medico</code>.", "correct": false}, {"letter": "B", "text": "En el código de Andrés, los <strong>atributos</strong> (<code>nombre</code>, <code>especialidad</code>, <code>tarjetaProfesional</code>) son los únicos elementos que definen completamente a un médico; los <strong>métodos</strong> como <code>agendarCita()</code> y <code>getNombre()</code> son opcionales y pertenecen a la <em>capa de servicio</em>, no a la clase <code>Medico</code> propiamente dicha. Siguiendo las buenas prácticas de arquitectura en capas, los métodos de negocio deberían estar en una clase separada llamada <code>MedicoService</code>, y la clase <code>Medico</code> debería contener <em>únicamente</em> los atributos con sus respectivos <em>getters</em> y <em>setters</em>. Esto convierte a <code>Medico</code> en un puro contenedor de datos, que es la forma correcta de definir una clase en Java moderno según el estándar JavaBeans.", "correct": false}, {"letter": "C", "text": "La clase <code>Medico</code> es el <strong>molde o plantilla</strong>: define la estructura general de lo que significa ser un médico en el sistema, pero no representa a ningún médico concreto. Cuando SaludApp registre al Dr. Ramírez, se creará un <em>objeto</em> —una instancia— a partir de ese molde. Dentro de esa plantilla conviven dos elementos distintos y complementarios: los <strong>atributos</strong> (<code>nombre</code>, <code>especialidad</code>, <code>tarjetaProfesional</code>) representan el <em>estado</em> —la información que describe al médico—, mientras que los <strong>métodos</strong> (<code>agendarCita()</code>, <code>getNombre()</code>) representan el <em>comportamiento</em> —las acciones que ese médico puede ejecutar—. Esta unión de estado y comportamiento en una misma entidad es precisamente la esencia de la orientación a objetos que Valentina le explicó al equipo.", "correct": true}]}, {"number": 4, "topic": "Encapsulamiento en Java", "scenario_paragraphs": ["El módulo de pacientes de <strong>SaludApp</strong> lleva una semana en producción cuando ocurre un incidente crítico: un bug en el módulo de facturación modificó directamente el atributo <code>saldoPendiente</code> de varios pacientes, asignándole un valor negativo. El hospital perdió información real de cobros.", "Valentina revisa el código y encuentra la causa: la clase <code>Paciente</code> fue escrita así por un junior:", "public class Paciente { public String nombre; public double saldoPendiente; // ← cualquiera puede escribir aquí public String diagnostico; } Desde el módulo de facturación, alguien escribió sin querer:", "Paciente p = obtenerPaciente(id); p.saldoPendiente = -500.0; // ← acceso directo, sin validación Valentina propone refactorizar la clase aplicando <strong>encapsulamiento</strong>. Felipe pregunta: <em>\"¿Pero si Java igual ejecuta el código con o sin <code>private</code>, para qué sirve realmente ese modificador?\"</em>"], "code_blocks": [{"label": "", "code": "public class Paciente {\n\n    public String  nombre;\n    public double  saldoPendiente;   // ← cualquiera puede escribir aquí\n    public String  diagnostico;\n}"}, {"label": "", "code": "Paciente p = obtenerPaciente(id);\np.saldoPendiente = -500.0;   // ← acceso directo, sin validación"}, {"label": "", "code": "public class Paciente {\n\n    private String  nombre;\n    private double  saldoPendiente;\n    private String  diagnostico;\n\n    public void setSaldoPendiente(double valor) {\n        if (valor >= 0) {\n            this.saldoPendiente = valor;\n        }\n    }\n\n    public double getSaldoPendiente() {\n        return saldoPendiente;\n    }\n}"}], "quote": "", "quote_author": "", "question": "Considerando el incidente ocurrido en SaludApp y la pregunta de Felipe, ¿cuál de las siguientes afirmaciones explica de forma más precisa qué es el encapsulamiento, cuál es su propósito real dentro del diseño orientado a objetos y por qué la versión de Valentina previene el tipo de error que ocurrió?", "hint": "observa el método <code>setSaldoPendiente()</code> en la versión corregida. Hace algo que la asignación directa <code>p.saldoPendiente = -500</code> no podría hacer. ¿Qué es y por qué importa?", "options": [{"letter": "A", "text": "El encapsulamiento consiste en <strong>restringir el acceso directo al estado interno de un objeto</strong> declarando sus atributos como <code>private</code> y exponiendo únicamente métodos controlados (<code>get</code> / <code>set</code>) para leer o modificar esos datos. Su propósito no es solo ocultar información, sino <strong>garantizar que el objeto siempre se encuentre en un estado válido</strong>: nadie puede asignarle un valor incoherente sin pasar por la lógica de validación del propio objeto. En SaludApp, la versión de Valentina previene el incidente porque <code>setSaldoPendiente()</code> incluye la validación <code>if (valor &gt;= 0)</code>: cualquier intento de asignar un saldo negativo es silenciosamente rechazado por el propio objeto. El módulo de facturación ya no puede corromper el dato directamente porque el compilador impide el acceso al atributo <code>private</code> desde fuera de la clase.", "correct": true}, {"letter": "B", "text": "El encapsulamiento es una <strong>convención de estilo</strong> que el equipo puede adoptar o no según su criterio. Declarar atributos como <code>private</code> no cambia el comportamiento del programa en tiempo de ejecución: la JVM accede igualmente a todos los campos del objeto en memoria. La diferencia entre <code>public</code> y <code>private</code> solo existe para el compilador, no para la máquina virtual. El verdadero problema en SaludApp no fue la falta de encapsulamiento, sino la ausencia de pruebas unitarias que validaran los valores antes de persistirlos en la base de datos. Agregar <code>private</code> y métodos <code>get/set</code> solo añade código repetitivo sin aportar valor real; la validación debería estar en la capa de servicio, no en el modelo de datos.", "correct": false}, {"letter": "C", "text": "El encapsulamiento es el mecanismo mediante el cual Java <strong>cifra los atributos sensibles</strong> de un objeto para protegerlos de accesos externos no autorizados, especialmente en aplicaciones que manejan datos clínicos o financieros como SaludApp. Al declarar <code>private double saldoPendiente</code>, la JVM activa una capa de protección en memoria que impide que otros procesos del sistema operativo lean o modifiquen ese valor directamente. Esto es especialmente importante en hospitales porque la <strong>HIPAA</strong> y normativas colombianas como la <strong>Ley 1581</strong> exigen que los datos clínicos estén protegidos a nivel de código, no solo a nivel de base de datos. El método <code>getSaldoPendiente()</code> funciona como un canal seguro que desencripta el valor solo cuando el solicitante tiene los permisos correctos asignados en el sistema de roles de la aplicación.", "correct": false}]}, {"number": 5, "topic": "Visibilidad public en propiedades", "scenario_paragraphs": ["El equipo de <strong>SaludApp</strong> está creciendo. Un nuevo desarrollador, <strong>Santiago</strong>, se integra al proyecto y se le asigna construir la clase <code>Turno</code>, que representa los turnos de atención del hospital. Santiago, que viene de trabajar con scripts rápidos, entrega esto:", "public class Turno { public int numero; public String paciente; public String estado; // \"PENDIENTE\", \"ATENDIDO\", \"CANCELADO\" public String medico; public void mostrarResumen() { System.out.println(\"Turno #\" + numero + \" - \" + estado); } } Al día siguiente aparecen dos problemas en el sistema. Primero, otro módulo asignó el estado <code>\"atendido\"</code> (minúscula) en lugar de <code>\"ATENDIDO\"</code>, rompiendo los filtros de búsqueda. Segundo, el número de turno de un paciente fue sobreescrito a <code>0</code> sin que nadie lo notara, generando un turno fantasma en la pantalla de espera.", "Valentina convoca al equipo y muestra cómo el código externo pudo hacer esto sin ninguna restricción:", "Turno t = obtenerTurno(5); t.estado = \"atendido\"; // valor inválido, sin validación t.numero = 0; // número de turno destruido t.paciente = \"\"; // paciente borrado \"El modificador <code>public</code> en una propiedad no es inocente. Estás diciéndole a todo el sistema: <em>entra, cambia lo que quieras, no necesito saber</em>.\""], "code_blocks": [{"label": "Turno.java — versión de Santiago", "code": "public class Turno {\n\n    public int     numero;\n    public String  paciente;\n    public String  estado;     // \"PENDIENTE\", \"ATENDIDO\", \"CANCELADO\"\n    public String  medico;\n\n    public void mostrarResumen() {\n        System.out.println(\"Turno #\" + numero + \" - \" + estado);\n    }\n}"}, {"label": "", "code": "Turno t = obtenerTurno(5);\nt.estado  = \"atendido\";    // valor inválido, sin validación\nt.numero  = 0;             // número de turno destruido\nt.paciente = \"\";           // paciente borrado"}], "quote": "\"El modificador <code>public</code> en una propiedad no es inocente. Estás diciéndole a todo el sistema: <em>entra, cambia lo que quieras, no necesito saber</em>.\"", "quote_author": "— Valentina, en la reunión post-incidente", "question": "Analizando los incidentes de la clase <code>Turno</code> y el comentario de Valentina, ¿cuál de las siguientes afirmaciones describe con mayor precisión las consecuencias reales de declarar propiedades como <code>public</code> en una clase Java y qué problema de diseño fundamental representa?", "hint": "nota que los dos bugs tienen algo en común — no son errores de lógica compleja, son asignaciones directas que nadie cuestionó. Piensa: ¿qué tendría que existir para que esas líneas ni siquiera compilaran?", "options": [{"letter": "A", "text": "Declarar propiedades como <code>public</code> es una práctica válida y en muchos contextos <strong>recomendada por rendimiento</strong>: el acceso directo a un campo evita el <em>overhead</em> de invocar un método getter o setter, lo que resulta en un menor tiempo de ejecución. En sistemas de alto tráfico como un hospital con decenas de turnos simultáneos, estas micromejoras se acumulan y marcan la diferencia. El problema de los bugs en SaludApp no fue el modificador <code>public</code>, sino la falta de documentación y convenciones de equipo: si todos los desarrolladores leen el Javadoc de la clase <code>Turno</code> y saben que <code>estado</code> solo acepta valores en mayúscula, los errores como el de Santiago simplemente no ocurren. La solución es disciplina de equipo, no restricciones técnicas.", "correct": false}, {"letter": "B", "text": "El modificador <code>public</code> en las propiedades de <code>Turno</code> es problemático únicamente cuando la clase es utilizada por <strong>clases de otros paquetes</strong>. Dentro del mismo paquete, las propiedades <code>public</code> se comportan igual que <code>private</code>, porque Java restringe automáticamente el alcance al contexto del paquete cuando no hay herencia involucrada. La solución correcta no es cambiar <code>public</code> a <code>private</code>, sino usar el modificador <code>protected</code>, que garantiza que solo las subclases de <code>Turno</code> y las clases del mismo paquete puedan modificar los atributos, ofreciendo un equilibrio ideal entre apertura y control para un sistema en crecimiento como SaludApp.", "correct": false}, {"letter": "C", "text": "Declarar una propiedad como <code>public</code> significa <strong>exponer la implementación interna del objeto al mundo exterior sin ningún intermediario</strong>: cualquier clase, en cualquier parte del proyecto, puede leer y escribir ese valor libremente. Esto rompe el principio de encapsulamiento porque el objeto pierde el control sobre su propio estado — no puede imponer restricciones, formatos ni validaciones sobre los valores que recibe. En SaludApp, declarar <code>public String estado</code> convierte una regla de negocio crítica —el estado solo puede ser <code>\"PENDIENTE\"</code>, <code>\"ATENDIDO\"</code> o <code>\"CANCELADO\"</code>— en una convención informal que <em>cualquier desarrollador puede ignorar por accidente</em>. Si <code>estado</code> fuera <code>private</code> con un setter que validara el valor recibido, la asignación inválida <code>\"atendido\"</code> nunca habría llegado al objeto: el compilador habría bloqueado el acceso directo y el setter habría rechazado el valor incorrecto.", "correct": true}]}, {"number": 6, "topic": "Propiedades private en Java", "scenario_paragraphs": ["Después del incidente con la clase <code>Turno</code>, Valentina refactoriza varias clases del sistema aplicando <code>private</code> en todos los atributos. Ahora el equipo debe entender exactamente qué implica esa decisión. Valentina propone un ejercicio: analizar esta clase y predecir qué compilará y qué no.", "public class Cita { private String paciente; private String medico; private String hora; public Cita(String paciente, String medico, String hora) { this.paciente = paciente; // (1) this.medico = medico; this.hora = hora; } public String getPaciente() { return paciente; // (2) } public void copiarDatos(Cita otra) { this.paciente = otra.paciente; // (3) this.hora = otra.hora; } } ModuloAgenda.java — uso externo Cita c = new Cita(\"Ana\", \"Dr. Ruiz\", \"10:00\"); String nombre = c.getPaciente(); // (4) c.paciente = \"Luis\"; // (5) ← ¿compila? Valentina señala los comentarios numerados del <strong>(1)</strong> al <strong>(5)</strong> y pregunta al equipo: <em>\"¿Cuáles de estos accesos al atributo <code>private</code> son válidos y cuáles generan error de compilación? ¿Y por qué el (3) es diferente al (5) si ambos acceden a <code>private</code>?\"</em>"], "code_blocks": [{"label": "Cita.java", "code": "public class Cita {\n\n    private String  paciente;\n    private String  medico;\n    private String  hora;\n\n    public Cita(String paciente, String medico, String hora) {\n        this.paciente = paciente;   // (1)\n        this.medico   = medico;\n        this.hora     = hora;\n    }\n\n    public String getPaciente() {\n        return paciente;            // (2)\n    }\n\n    public void copiarDatos(Cita otra) {\n        this.paciente = otra.paciente; // (3)\n        this.hora     = otra.hora;\n    }\n}"}, {"label": "ModuloAgenda.java — uso externo", "code": "Cita c = new Cita(\"Ana\", \"Dr. Ruiz\", \"10:00\");\nString nombre = c.getPaciente();   // (4)\nc.paciente    = \"Luis\";              // (5) ← ¿compila?"}], "quote": "", "quote_author": "", "question": "Analizando los cinco accesos marcados en el código, ¿cuál de las siguientes afirmaciones describe correctamente el alcance real del modificador <code>private</code> en Java y explica por qué el acceso <strong>(3)</strong> es legal mientras que el <strong>(5)</strong> no lo es?", "hint": "en el acceso <strong>(3)</strong>, el método <code>copiarDatos()</code> pertenece a la clase <code>Cita</code> y accede a <code>otra.paciente</code>, siendo <code>otra</code> también una instancia de <code>Cita</code>. Pregúntate: ¿la restricción <code>private</code> aplica por instancia o por clase?", "options": [{"letter": "A", "text": "El modificador <code>private</code> restringe el acceso al atributo únicamente a la <strong>instancia actual</strong> del objeto, identificada por la referencia <code>this</code>. Esto explica por qué los accesos <strong>(1)</strong> y <strong>(2)</strong> son válidos — usan <code>this</code> implícita o explícitamente — y por qué el acceso <strong>(3)</strong> falla igual que el <strong>(5)</strong>: en ambos casos se accede al atributo de una referencia externa (<code>otra</code> y <code>c</code>), que no es la instancia actual. Para que <code>copiarDatos()</code> compilara correctamente, Valentina debería reescribirlo usando el getter de la otra instancia: <code>this.paciente = otra.getPaciente()</code>, ya que el acceso directo a <code>otra.paciente</code> viola la restricción de instancia que impone <code>private</code>.", "correct": false}, {"letter": "B", "text": "El modificador <code>private</code> restringe el acceso por <strong>clase</strong>, no por instancia: cualquier método que pertenezca a la clase <code>Cita</code> puede acceder a los atributos <code>private</code> de <em>cualquier instancia</em> de esa misma clase, sin importar si es <code>this</code> u otra referencia como <code>otra</code>. Por eso los accesos <strong>(1)</strong>, <strong>(2)</strong> y <strong>(3)</strong> son todos válidos y compilan sin error: los tres ocurren <em>dentro del código de la clase</em> <code>Cita</code>. En cambio, el acceso <strong>(5)</strong> falla porque ocurre en <code>ModuloAgenda</code>, que es una clase diferente. El acceso <strong>(4)</strong> también es válido porque usa el método público <code>getPaciente()</code> — la única puerta autorizada desde fuera de la clase.", "correct": true}, {"letter": "C", "text": "El acceso <strong>(3)</strong> es legal porque Java aplica una excepción especial al modificador <code>private</code> cuando ambos objetos son del mismo tipo: si <code>this</code> y <code>otra</code> son ambas instancias de <code>Cita</code>, la JVM detecta en tiempo de ejecución que comparten el mismo descriptor de clase y relaja automáticamente la restricción de visibilidad, permitiendo el acceso cruzado entre instancias del mismo tipo. El acceso <strong>(5)</strong> falla porque <code>ModuloAgenda</code> está en un paquete diferente, y la JVM no puede verificar en tiempo de ejecución que el acceso sea seguro sin un <em>cast</em> explícito. Si <code>ModuloAgenda</code> extendiera la clase <code>Cita</code> con <code>extends</code>, podría acceder directamente a los atributos <code>private</code> heredados sin necesidad de getters, ya que la herencia en Java transfiere todos los miembros al contexto de la subclase.", "correct": false}]}, {"number": 7, "topic": "El método toString() en Java", "scenario_paragraphs": ["El equipo de <strong>SaludApp</strong> está depurando un módulo de reportes. Felipe nota algo extraño en la consola durante las pruebas: cada vez que intenta imprimir un objeto <code>Cita</code> para verificar su contenido, aparece algo así:", "// Felipe escribió esto: Cita c = new Cita(\"Ana\", \"Dr. Ruiz\", \"10:00\"); System.out.println(c); // Y obtuvo esto en consola: Cita@6d06d69c Felipe, confundido, llama a Valentina. Ella sonríe y explica que ese resultado extraño es el comportamiento <em>por defecto</em> cuando una clase no define cómo quiere ser representada como texto. Luego muestra la solución:", "public class Cita { private String paciente; private String medico; private String hora; // ... constructor y getters ... @Override public String toString() { return \"Cita{\" + \"paciente='\" + paciente + \"'\" + \", medico='\" + medico + \"'\" + \", hora='\" + hora + \"'\" + \"}\"; } } Consola — ahora sí Cita{paciente='Ana', medico='Dr. Ruiz', hora='10:00'} \"Toda clase en Java hereda automáticamente de <code>Object</code>. Y <code>Object</code> ya tiene un <code>toString()</code>... pero su versión no sabe nada de <em>tu</em> clase. Por eso hay que sobreescribirlo.\""], "code_blocks": [{"label": "Consola — salida inesperada", "code": "// Felipe escribió esto:\nCita c = new Cita(\"Ana\", \"Dr. Ruiz\", \"10:00\");\nSystem.out.println(c);\n\n// Y obtuvo esto en consola:\nCita@6d06d69c"}, {"label": "Cita.java — con toString() sobreescrito", "code": "public class Cita {\n\n    private String paciente;\n    private String medico;\n    private String hora;\n\n    // ... constructor y getters ...\n\n    @Override\n    public String toString() {\n        return \"Cita{\" +\n               \"paciente='\" + paciente + \"'\" +\n               \", medico='\"  + medico   + \"'\" +\n               \", hora='\"    + hora     + \"'\" +\n               \"}\";\n    }\n}"}, {"label": "Consola — ahora sí", "code": "Cita{paciente='Ana', medico='Dr. Ruiz', hora='10:00'}"}], "quote": "\"Toda clase en Java hereda automáticamente de <code>Object</code>. Y <code>Object</code> ya tiene un <code>toString()</code>... pero su versión no sabe nada de <em>tu</em> clase. Por eso hay que sobreescribirlo.\"", "quote_author": "— Valentina, explicando el resultado <code>Cita@6d06d69c</code>", "question": "Considerando lo que observó Felipe en la consola y la explicación de Valentina, ¿cuál de las siguientes afirmaciones describe correctamente el propósito del método <code>toString()</code>, su origen en Java y por qué <code>println(c)</code> lo invocó sin que Felipe lo llamara explícitamente?", "hint": "Felipe no llamó explícitamente a ningún método llamado <code>toString()</code> — solo hizo <code>println(c)</code>. Sin embargo el método se ejecutó igual. Piensa: ¿qué disparó esa ejecución y desde dónde viene ese método originalmente?", "options": [{"letter": "A", "text": "El método <code>toString()</code> es el mecanismo de <strong>serialización estándar</strong> de Java: convierte el estado del objeto en una cadena de texto estructurada que puede transmitirse por red, almacenarse en base de datos o reconstruirse posteriormente. Es el equivalente básico de JSON en el ecosistema Java puro, antes de que existieran librerías como Gson o Jackson. En SaludApp, cuando Valentina sobreescribe <code>toString()</code> en la clase <code>Cita</code>, está preparando el objeto para ser <em>serializado</em> eficientemente. El motivo por el que <code>println(c)</code> lo invoca automáticamente es que <code>PrintStream</code> detecta si el objeto implementa serialización y lo convierte antes de enviarlo al flujo de salida, evitando así mostrar la dirección de memoria cruda.", "correct": false}, {"letter": "B", "text": "El método <code>toString()</code> es un método de instancia ordinario que <strong>solo se ejecuta cuando el desarrollador lo llama explícitamente</strong>: <code>c.toString()</code>. El hecho de que <code>println(c)</code> mostrara <code>Cita@6d06d69c</code> antes de sobreescribirlo no tiene relación con <code>toString()</code>: esa salida es generada directamente por <code>println</code>, que al recibir un objeto imprime su dirección de memoria usando una función nativa de la JVM, independientemente de si la clase define o no un <code>toString()</code>. Después de sobreescribir el método, <code>println(c)</code> sigue sin invocarlo automáticamente — simplemente Felipe ahora llama <code>c.toString()</code> internamente en su código y pasa el resultado a <code>println</code>. Por eso ahora se ve el texto formateado: no es automático, es que alguien agregó esa llamada explícita.", "correct": false}, {"letter": "C", "text": "<code>toString()</code> es un método definido en la clase <strong><code>Object</code></strong>, la raíz de la jerarquía de clases en Java: toda clase hereda automáticamente de <code>Object</code>, incluyendo <code>Cita</code>. Su versión por defecto devuelve una cadena con el nombre de la clase seguido de un código hexadecimal de memoria —lo que vio Felipe: <code>Cita@6d06d69c</code>— porque <code>Object</code> no conoce los atributos propios de cada clase hija. Al sobreescribirlo con <code>@Override</code>, la clase <code>Cita</code> reemplaza esa versión genérica con una representación útil. La razón por la que <code>println(c)</code> lo invoca <em>sin llamada explícita</em> es que Java llama automáticamente a <code>toString()</code> cada vez que necesita convertir un objeto a <code>String</code>: en concatenaciones con <code>+</code>, en <code>println()</code> y en cualquier contexto donde se espera texto.", "correct": true}]}, {"number": 8, "topic": "Constructores en Java", "scenario_paragraphs": ["El equipo de <strong>SaludApp</strong> está construyendo el módulo de registro de pacientes. Santiago, que ya aprendió la lección sobre <code>public</code> vs <code>private</code>, entrega esta nueva versión de la clase <code>Paciente</code>:", "public class Paciente { private String nombre; private int edad; private String tipoSangre; // Constructor 1 public Paciente() { this.nombre = \"Sin nombre\"; this.edad = 0; this.tipoSangre = \"Desconocido\"; } // Constructor 2 public Paciente(String nombre, int edad, String tipoSangre) { this.nombre = nombre; this.edad = edad; this.tipoSangre = tipoSangre; } // ... getters, setters, toString ... } Al revisar el código, Felipe usa los dos constructores de formas distintas:", "// Usando Constructor 1 — sin datos Paciente p1 = new Paciente(); // Usando Constructor 2 — con datos completos Paciente p2 = new Paciente(\"Carlos\", 34, \"O+\"); // ¿Puede hacer esto Felipe? p2.Paciente(\"Luis\", 28, \"A-\"); // ← intento de \"re-construir\" Valentina ve el último intento y detiene a Felipe: <em>\"Eso no existe en Java. El constructor no es un método que puedas llamar cuando quieras. Solo hay un momento en que se ejecuta, y no es ese.\"</em>"], "code_blocks": [{"label": "Paciente.java", "code": "public class Paciente {\n\n    private String  nombre;\n    private int     edad;\n    private String  tipoSangre;\n\n    // Constructor 1\n    public Paciente() {\n        this.nombre     = \"Sin nombre\";\n        this.edad       = 0;\n        this.tipoSangre = \"Desconocido\";\n    }\n\n    // Constructor 2\n    public Paciente(String nombre, int edad, String tipoSangre) {\n        this.nombre     = nombre;\n        this.edad       = edad;\n        this.tipoSangre = tipoSangre;\n    }\n\n    // ... getters, setters, toString ...\n}"}, {"label": "ModuloRegistro.java", "code": "// Usando Constructor 1 — sin datos\nPaciente p1 = new Paciente();\n\n// Usando Constructor 2 — con datos completos\nPaciente p2 = new Paciente(\"Carlos\", 34, \"O+\");\n\n// ¿Puede hacer esto Felipe?\np2.Paciente(\"Luis\", 28, \"A-\");  // ← intento de \"re-construir\""}], "quote": "", "quote_author": "— Valentina, revisando el código de Felipe", "question": "Analizando la clase <code>Paciente</code>, el uso que hace Felipe y el intento fallido de \"re-construir\" el objeto, ¿cuál de las siguientes afirmaciones describe correctamente qué es un constructor en Java, cuándo se ejecuta y qué características lo distinguen de un método ordinario?", "hint": "observa que los dos constructores tienen el <em>mismo nombre</em> que la clase pero diferente número de parámetros. También nota que ninguno declara tipo de retorno —ni siquiera <code>void</code>. ¿Qué dice eso sobre su naturaleza dentro del lenguaje?", "options": [{"letter": "A", "text": "Un constructor es un bloque especial de inicialización que se ejecuta <strong>una única vez</strong>: en el momento exacto en que se crea el objeto con <code>new</code>. Su función es establecer el estado inicial válido del objeto antes de que cualquier otro código pueda usarlo. Se diferencia de un método ordinario en tres aspectos clave: lleva exactamente el <strong>mismo nombre que la clase</strong>, <strong>no declara tipo de retorno</strong> (ni siquiera <code>void</code>), y <strong>no puede invocarse directamente</strong> sobre un objeto ya creado. En <code>Paciente</code>, tener dos constructores con diferente número de parámetros es válido en Java: se llama <strong>sobrecarga de constructores</strong>, y permite crear instancias con distintos niveles de información disponible. El intento de Felipe — <code>p2.Paciente(...)</code> — no compila porque el constructor no es un método de instancia y no puede llamarse sobre un objeto ya existente: su único momento de ejecución fue cuando se escribió <code>new Paciente(...)</code>.", "correct": true}, {"letter": "B", "text": "El constructor es esencialmente un <strong>método especial de reinicio</strong> que puede invocarse en cualquier momento del ciclo de vida del objeto para restaurar sus atributos a un estado conocido. La diferencia con un método normal es únicamente sintáctica: lleva el nombre de la clase y no declara <code>void</code>. Por eso es perfectamente válido llamarlo sobre un objeto ya creado cuando se necesita \"limpiar\" su estado, como hace Felipe con <code>p2.Paciente(\"Luis\", 28, \"A-\")</code>. En SaludApp esto sería muy útil: si un médico necesita reasignar un objeto <code>Paciente</code> a otro paciente diferente sin crear un nuevo objeto —evitando así presionar al recolector de basura— simplemente llamaría al constructor nuevamente para sobrescribir todos los atributos de golpe. Esta técnica es especialmente útil en sistemas de alto rendimiento donde crear objetos frecuentemente impacta el tiempo de respuesta.", "correct": false}, {"letter": "C", "text": "En Java, cuando una clase no define ningún constructor explícitamente, el compilador genera automáticamente un <strong>constructor por defecto estático</strong>: un bloque que pertenece a la clase en sí, no a las instancias, y que se comparte entre todos los objetos creados. Esto explica por qué <code>p1</code> y <code>p2</code> en SaludApp comparten referencias al mismo bloque de inicialización en memoria. La sobrecarga de constructores en <code>Paciente</code> —tener uno sin parámetros y otro con tres— es posible porque Java almacena ambas versiones en el área <em>metaspace</em> de la JVM como métodos estáticos del tipo, y en tiempo de ejecución selecciona cuál invocar basándose en la firma de los argumentos pasados a <code>new</code>. El hecho de que el constructor no declare <code>void</code> confirma precisamente su naturaleza estática: los métodos estáticos en Java tampoco están obligados a retornar un valor si no manipulan el estado de instancia.", "correct": false}]}, {"number": 9, "topic": "Sobrecarga de constructores en Java", "scenario_paragraphs": ["El equipo de <strong>SaludApp</strong> necesita registrar médicos de diferentes formas: a veces solo se tiene el nombre disponible al inicio, otras veces llega la ficha completa desde el sistema del ministerio. Valentina propone una clase <code>Medico</code> con tres constructores para cubrir los distintos escenarios:", "public class Medico { private String nombre; private String especialidad; private int tarjeta; // ① Solo nombre public Medico(String nombre) { this(nombre, \"General\", 0); // llama al constructor ③ } // ② Nombre + especialidad public Medico(String nombre, String especialidad) { this(nombre, especialidad, 0); // llama al constructor ③ } // ③ Completo — el que realmente inicializa public Medico(String nombre, String especialidad, int tarjeta) { this.nombre = nombre; this.especialidad = especialidad; this.tarjeta = tarjeta; } } Felipe observa el código y hace dos preguntas al equipo:", "\"Los tres se llaman igual. ¿Cómo sabe Java cuál usar cuando escribo <code>new Medico(...)</code>?\"", "\"¿Qué hace ese <code>this(...)</code> dentro del constructor ① y ②? ¿Es una llamada recursiva?\"", "\"No es recursión. Es encadenamiento. Los constructores ① y ② no duplican lógica — delegan al constructor principal. Cambias la inicialización en un solo lugar y todos se benefician.\""], "code_blocks": [{"label": "Medico.java — tres constructores", "code": "public class Medico {\n\n    private String nombre;\n    private String especialidad;\n    private int    tarjeta;\n\n    // ① Solo nombre\n    public Medico(String nombre) {\n        this(nombre, \"General\", 0);   // llama al constructor ③\n    }\n\n    // ② Nombre + especialidad\n    public Medico(String nombre, String especialidad) {\n        this(nombre, especialidad, 0);    // llama al constructor ③\n    }\n\n    // ③ Completo — el que realmente inicializa\n    public Medico(String nombre, String especialidad, int tarjeta) {\n        this.nombre       = nombre;\n        this.especialidad = especialidad;\n        this.tarjeta      = tarjeta;\n    }\n}"}], "quote": "\"No es recursión. Es encadenamiento. Los constructores ① y ② no duplican lógica — delegan al constructor principal. Cambias la inicialización en un solo lugar y todos se benefician.\"", "quote_author": "— Valentina, explicando el patrón", "question": "Considerando las preguntas de Felipe y el diseño de la clase <code>Medico</code>, ¿cuál de las siguientes afirmaciones describe correctamente qué es la sobrecarga de constructores, cómo determina Java cuál constructor ejecutar y qué papel cumple <code>this(...)</code> dentro de un constructor?", "hint": "los tres constructores se llaman igual pero reciben diferente número y tipo de parámetros. En Java esto se llama <em>firma</em>. Pregúntate: ¿qué elementos componen la firma de un constructor y qué pasa si dos constructores tienen la misma firma aunque tengan distinto cuerpo?", "options": [{"letter": "A", "text": "La sobrecarga de constructores en Java funciona asignando internamente un <strong>alias numérico</strong> a cada versión según el orden de declaración en el código: el primero que aparece en el archivo se convierte en <code>Medico$1</code>, el segundo en <code>Medico$2</code> y así sucesivamente. Cuando el desarrollador escribe <code>new Medico(\"Juan\")</code>, el compilador cuenta los argumentos y selecciona el alias correspondiente. El uso de <code>this(...)</code> dentro del constructor ① es una <strong>llamada explícita al alias</strong> <code>Medico$3</code>, que el compilador resuelve en tiempo de compilación sustituyendo la referencia por la dirección del tercer constructor en el <em>bytecode</em>. Por eso el orden en que se escriben los constructores en el archivo sí importa: si se mueve el constructor completo al inicio, los alias cambian y <code>this(...)</code> apuntaría a un constructor diferente.", "correct": false}, {"letter": "B", "text": "La sobrecarga de constructores es válida en Java siempre que las versiones tengan diferente número de parámetros. Una de sus ventajas clave es que, al usar herencia, todos los constructores sobrecargados de la clase padre se <strong>heredan automáticamente</strong> por la subclase: si <code>MedicoEspecialista extends Medico</code>, la subclase podrá usar los tres constructores definidos en <code>Medico</code> directamente con <code>new MedicoEspecialista(\"Juan\")</code> sin necesidad de redeclararlos. El uso de <code>this(...)</code> dentro del constructor ① es equivalente a escribir <code>super(...)</code>: ambas palabras clave permiten delegar la inicialización al constructor más completo, con la diferencia de que <code>this(...)</code> se usa cuando la clase no tiene padre explícito y <code>super(...)</code> cuando sí lo tiene. Java elige automáticamente entre los dos según si hay una relación de herencia declarada.", "correct": false}, {"letter": "C", "text": "La sobrecarga de constructores permite definir <strong>múltiples versiones del mismo constructor</strong> en una clase, siempre que cada una tenga una <em>firma diferente</em>: distinto número de parámetros, distintos tipos, o distinto orden de tipos. Java determina cuál ejecutar en tiempo de compilación comparando los argumentos de <code>new</code> contra las firmas disponibles — el orden de declaración en el código no influye en absoluto. El uso de <code>this(...)</code> dentro de un constructor es el mecanismo de <strong>encadenamiento de constructores</strong>: permite que un constructor delegue la inicialización real a otro constructor de la misma clase, evitando duplicar código. Debe ser siempre la <em>primera instrucción</em> del constructor que lo usa. En la clase <code>Medico</code>, los constructores ① y ② son puertas de entrada simplificadas que convergen en el constructor ③ — el único que realmente toca los atributos — garantizando un único punto de inicialización que es fácil de mantener.", "correct": true}]}, {"number": 10, "topic": "Herencia en Java", "scenario_paragraphs": ["SaludApp está creciendo. Ahora el sistema debe manejar no solo <strong>médicos</strong> sino también <strong>enfermeros</strong> y <strong>administradores</strong>. El equipo nota que las tres entidades comparten varios atributos: <code>nombre</code>, <code>identificacion</code>, <code>correo</code> y el método <code>iniciarSesion()</code>. Sin herencia, Santiago estaría copiando ese código tres veces.", "Valentina propone modelar el sistema con herencia:", "// Clase padre — atributos y comportamiento COMÚN public class Personal { private String nombre; private String identificacion; private String correo; public void iniciarSesion() { System.out.println(nombre + \" ha iniciado sesión\"); } // getters, setters, constructor... } // Clase hija — hereda Personal y agrega lo propio public class Medico extends Personal { private String especialidad; private int tarjeta; public void agendarCita() { /* ... */ } } // Otra clase hija public class Enfermero extends Personal { private String turno; public void tomarSignosVitales() { /* ... */ } } Felipe prueba el código y confirma que puede hacer esto sin errores:", "Medico m = new Medico(...); m.iniciarSesion(); // ← heredado de Personal, sin redefinirlo m.agendarCita(); // ← propio de Medico Enfermero e = new Enfermero(...); e.iniciarSesion(); // ← también heredado, mismo método e.tomarSignosVitales(); \"Un médico <em>es un</em> personal del hospital. Un enfermero también. Esa relación 'es un' es la señal de que la herencia tiene sentido aquí. Si la relación fuera 'tiene un', usaríamos composición — pero eso es otro tema.\""], "code_blocks": [{"label": "Personal.java + Medico.java + Enfermero.java", "code": "// Clase padre — atributos y comportamiento COMÚN\npublic class Personal {\n    private String nombre;\n    private String identificacion;\n    private String correo;\n\n    public void iniciarSesion() {\n        System.out.println(nombre + \" ha iniciado sesión\");\n    }\n    // getters, setters, constructor...\n}\n\n// Clase hija — hereda Personal y agrega lo propio\npublic class Medico extends Personal {\n    private String especialidad;\n    private int    tarjeta;\n\n    public void agendarCita() { /* ... */ }\n}\n\n// Otra clase hija\npublic class Enfermero extends Personal {\n    private String turno;\n\n    public void tomarSignosVitales() { /* ... */ }\n}"}, {"label": "", "code": "Medico m = new Medico(...);\nm.iniciarSesion();   // ← heredado de Personal, sin redefinirlo\nm.agendarCita();     // ← propio de Medico\n\nEnfermero e = new Enfermero(...);\ne.iniciarSesion();   // ← también heredado, mismo método\ne.tomarSignosVitales();"}], "quote": "\"Un médico <em>es un</em> personal del hospital. Un enfermero también. Esa relación 'es un' es la señal de que la herencia tiene sentido aquí. Si la relación fuera 'tiene un', usaríamos composición — pero eso es otro tema.\"", "quote_author": "— Valentina, explicando el criterio de diseño", "question": "Considerando el rediseño de SaludApp con la clase <code>Personal</code> como padre y el uso del criterio \"es un\" que menciona Valentina, ¿cuál de las siguientes afirmaciones describe correctamente qué es la herencia en Java, qué garantiza la palabra clave <code>extends</code> y cuál es su limitación fundamental en el lenguaje?", "hint": "nota que <code>Medico</code> y <code>Enfermero</code> no redeclararon <code>iniciarSesion()</code>, pero lo pueden usar. También fíjate en cuántos <code>extends</code> aparecen por clase. ¿Podría haber dos?", "options": [{"letter": "A", "text": "La herencia en Java es un mecanismo de <strong>copia automática de código</strong>: cuando se escribe <code>Medico extends Personal</code>, el compilador duplica todo el código fuente de <code>Personal</code> dentro de <code>Medico</code> antes de compilar. El resultado es que cada clase hija tiene su propia versión independiente de los atributos y métodos del padre, por eso modificar <code>Personal</code> después de compilar no afecta a <code>Medico</code> ni a <code>Enfermero</code>. La ventaja principal es de escritura: el desarrollador no teclea los mismos atributos en cada clase. Pero en memoria cada objeto de tipo <code>Medico</code> y cada objeto de tipo <code>Enfermero</code> son completamente independientes entre sí y respecto a <code>Personal</code>, sin ninguna relación jerárquica en tiempo de ejecución. Por eso en Java no existe forma de tratar a un <code>Medico</code> como si fuera un <code>Personal</code> después de compilar.", "correct": false}, {"letter": "B", "text": "La herencia permite que una clase hija <strong>extienda</strong> a una clase padre usando <code>extends</code>, obteniendo automáticamente todos sus atributos y métodos no privados sin necesidad de redeclararlos. Esto establece una relación jerárquica real en tiempo de ejecución: un objeto de tipo <code>Medico</code> <em>es un</em> <code>Personal</code>, lo que permite tratarlo como tal en cualquier parte del código que espere un <code>Personal</code>. La limitación fundamental de Java es que una clase solo puede heredar de <strong>una única clase padre</strong> — no existe herencia múltiple de clases. Si se escribiera <code>class Medico extends Personal, Empleado</code>, el compilador generaría un error. Para lograr comportamientos de múltiples fuentes, Java ofrece las <strong>interfaces</strong>, que sí pueden combinarse en cualquier cantidad.", "correct": true}, {"letter": "C", "text": "La herencia en Java mediante <code>extends</code> permite que una clase hija reciba los atributos y métodos de su padre y los use directamente. A diferencia de otros lenguajes, Java <strong>sí soporta herencia múltiple de clases</strong>: una misma clase puede extender varias clases simultáneamente separándolas con coma, siempre que no existan conflictos de nombres entre sus métodos. En SaludApp, si se necesitara que <code>Medico</code> heredara tanto de <code>Personal</code> como de <code>Empleado</code>, bastaría con escribir <code>class Medico extends Personal, Empleado</code>. Java resuelve automáticamente los posibles conflictos de métodos priorizando el primero que aparece en la lista de padres, siguiendo el mismo mecanismo que usa C++ con su tabla de métodos virtuales.", "correct": false}]}, {"number": 11, "topic": "Agregación de clases en Java", "scenario_paragraphs": ["El equipo de <strong>SaludApp</strong> necesita modelar que un <strong>médico pertenece a un consultorio</strong>, y que ese consultorio también puede ser usado por otros médicos. Valentina advierte que no es herencia — un médico no <em>es un</em> consultorio — sino que el médico <em>tiene un</em> consultorio asignado. Propone modelarlo así:", "public class Consultorio { private int numero; private String piso; public Consultorio(int numero, String piso) { this.numero = numero; this.piso = piso; } // getters, toString... } public class Medico extends Personal { private String especialidad; private Consultorio consultorio; // ← AGREGACIÓN public Medico(String nombre, String esp, Consultorio c) { super(nombre); this.especialidad = esp; this.consultorio = c; // recibe el objeto desde afuera } } Santiago prueba el modelo y nota algo importante: cuando el médico se retira del sistema, el consultorio sigue existiendo y puede reasignarse a otro médico:", "Consultorio c101 = new Consultorio(101, \"2do piso\"); Medico m1 = new Medico(\"Dr. Ruiz\", \"Cardiología\", c101); Medico m2 = new Medico(\"Dra. López\", \"Pediatría\", c101); // m1 sale del sistema... m1 = null; // c101 sigue vivo — m2 aún lo referencia System.out.println(c101.getNumero()); // → 101 \"¿Ven la diferencia? El consultorio existe independientemente del médico. No nació con él y no muere con él. Eso es agregación: una relación <em>tiene un</em> donde ambos viven sus propias vidas.\""], "code_blocks": [{"label": "Consultorio.java + Medico.java", "code": "public class Consultorio {\n    private int    numero;\n    private String piso;\n\n    public Consultorio(int numero, String piso) {\n        this.numero = numero;\n        this.piso   = piso;\n    }\n    // getters, toString...\n}\n\npublic class Medico extends Personal {\n    private String      especialidad;\n    private Consultorio consultorio;  // ← AGREGACIÓN\n\n    public Medico(String nombre, String esp, Consultorio c) {\n        super(nombre);\n        this.especialidad = esp;\n        this.consultorio  = c;   // recibe el objeto desde afuera\n    }\n}"}, {"label": "Creado independientemente", "code": "Consultorio c101 = new Consultorio(101, \"2do piso\");\n\nMedico m1 = new Medico(\"Dr. Ruiz\", \"Cardiología\", c101);\nMedico m2 = new Medico(\"Dra. López\", \"Pediatría\", c101);\n\n// m1 sale del sistema...\nm1 = null;\n\n// c101 sigue vivo — m2 aún lo referencia\nSystem.out.println(c101.getNumero());  // → 101"}], "quote": "\"¿Ven la diferencia? El consultorio existe independientemente del médico. No nació con él y no muere con él. Eso es agregación: una relación <em>tiene un</em> donde ambos viven sus propias vidas.\"", "quote_author": "— Valentina, explicando el ciclo de vida", "question": "Analizando la relación entre <code>Medico</code> y <code>Consultorio</code> en SaludApp y la explicación de Valentina sobre el ciclo de vida, ¿cuál de las siguientes afirmaciones describe correctamente qué es la agregación en POO, qué la distingue de la herencia y cuál es su característica esencial respecto al ciclo de vida de los objetos involucrados?", "hint": "en el constructor de <code>Medico</code>, el <code>Consultorio</code> llega como parámetro desde fuera — no se crea con <code>new</code> adentro. ¿Qué dice eso sobre quién controla el ciclo de vida del consultorio?", "options": [{"letter": "A", "text": "La agregación es esencialmente <strong>herencia implícita</strong>: cuando una clase tiene como atributo un objeto de otra clase, Java establece internamente la misma relación jerárquica que si se usara <code>extends</code>, pero sin declararlo explícitamente en el código. Por eso <code>Medico</code> puede acceder a los métodos de <code>Consultorio</code> como si fueran propios: la JVM reconoce la relación y habilita el acceso polimórfico entre ambas clases. La diferencia práctica con la herencia explícita es únicamente de sintaxis: con <code>extends</code> el compilador genera código más eficiente porque conoce la jerarquía en tiempo de compilación, mientras que en agregación la resolución es dinámica y ocurre en tiempo de ejecución cuando se invoca un método del objeto contenido. En términos de diseño, ambas relaciones expresan que una entidad <em>es un</em> tipo de otra.", "correct": false}, {"letter": "B", "text": "La agregación es una relación <em>tiene un</em> donde una clase contiene como atributo un objeto de otra clase. Su característica principal es que el <strong>ciclo de vida del objeto contenido depende del contenedor</strong>: cuando el objeto <code>Medico</code> es eliminado o sale del alcance, el <code>Consultorio</code> asociado también se marca para ser recolectado por el garbage collector, ya que su única referencia existente era la del médico que lo contenía. Esto explica por qué en SaludApp se pasa el <code>Consultorio</code> como parámetro al constructor: el médico recibe la responsabilidad de gestionar el ciclo de vida del consultorio y liberarlo cuando él mismo desaparezca. Esta vinculación garantiza integridad referencial — nunca puede existir un consultorio sin un médico que lo contenga.", "correct": false}, {"letter": "C", "text": "La agregación es una relación <em>tiene un</em> donde una clase usa como atributo un objeto de otra clase, pero <strong>ambos tienen ciclos de vida independientes</strong>: el objeto contenido puede existir antes, durante y después del contenedor, y puede ser compartido por varios objetos al mismo tiempo. En código, la señal característica es que el objeto contenido se <strong>recibe como parámetro</strong> desde el exterior — no se crea con <code>new</code> dentro del constructor del contenedor. A diferencia de la herencia —que modela una relación <em>es un</em> y usa <code>extends</code>— la agregación modela que un objeto <em>usa</em> a otro sin absorberlo. Y a diferencia de la <strong>composición</strong> — donde el objeto contenido se crea internamente y muere con el contenedor — en la agregación el contenido sobrevive de forma autónoma. En SaludApp, el <code>Consultorio 101</code> puede existir sin ningún médico asignado y puede compartirse entre <code>m1</code> y <code>m2</code> simultáneamente.", "correct": true}]}, {"number": 12, "topic": "Atributos static final en Java", "scenario_paragraphs": ["El equipo de <strong>SaludApp</strong> está definiendo las reglas de negocio del sistema. Valentina nota que varios valores críticos —como el número máximo de citas por día, los estados válidos de una cita, y la versión del sistema— están dispersos por el código como números y cadenas literales. Esto genera un problema conocido como <em>magic numbers</em>: si el límite de citas cambia de 20 a 25, hay que buscar y cambiar ese valor en decenas de lugares.", "Valentina propone centralizar esos valores como <strong>constantes de clase</strong>:", "public class ConfiguracionSistema { public static final int MAX_CITAS_DIA = 20; public static final String VERSION_SISTEMA = \"2.4.1\"; public static final String ESTADO_PENDIENTE = \"PENDIENTE\"; pub
