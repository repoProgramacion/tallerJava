lic static final String ESTADO_ATENDIDO = \"ATENDIDO\"; public static final String ESTADO_CANCELADO = \"CANCELADO\"; } Ahora cualquier clase del sistema puede usar estos valores sin instanciar <code>ConfiguracionSistema</code>:", "if (citasDeHoy &gt;= ConfiguracionSistema.MAX_CITAS_DIA) { throw new RuntimeException(\"Agenda llena\"); } turno.setEstado(ConfiguracionSistema.ESTADO_PENDIENTE); // ¿Puede Santiago hacer esto? ConfiguracionSistema.MAX_CITAS_DIA = 999; // ← ¿compila? \"El compilador te va a detener antes de que ese cambio llegue a producción. <code>final</code> garantiza que nadie —ni tú, ni yo, ni un bug— puede cambiar ese valor una vez asignado. Es la forma de Java de decir: <em>esta regla no negocia</em>.\""], "code_blocks": [{"label": "ConfiguracionSistema.java", "code": "public class ConfiguracionSistema {\n\n    public static final int    MAX_CITAS_DIA   = 20;\n    public static final String VERSION_SISTEMA = \"2.4.1\";\n    public static final String ESTADO_PENDIENTE = \"PENDIENTE\";\n    public static final String ESTADO_ATENDIDO  = \"ATENDIDO\";\n    public static final String ESTADO_CANCELADO = \"CANCELADO\";\n}"}, {"label": "ValidadorCitas.java — uso de constantes", "code": "if (citasDeHoy >= ConfiguracionSistema.MAX_CITAS_DIA) {\n    throw new RuntimeException(\"Agenda llena\");\n}\nturno.setEstado(ConfiguracionSistema.ESTADO_PENDIENTE);\n\n// ¿Puede Santiago hacer esto?\nConfiguracionSistema.MAX_CITAS_DIA = 999;  // ← ¿compila?"}], "quote": "\"El compilador te va a detener antes de que ese cambio llegue a producción. <code>final</code> garantiza que nadie —ni tú, ni yo, ni un bug— puede cambiar ese valor una vez asignado. Es la forma de Java de decir: <em>esta regla no negocia</em>.\"", "quote_author": "— Valentina, explicando por qué el último intento de Santiago falla", "question": "Considerando el diseño de <code>ConfiguracionSistema</code>, la forma en que se accede a las constantes y el error que genera el intento de Santiago, ¿cuál de las siguientes afirmaciones describe correctamente qué aporta <code>static</code>, qué aporta <code>final</code> y por qué la combinación <code>static final</code> es el patrón estándar para constantes en Java?", "hint": "observa que las constantes se acceden con <code>ConfiguracionSistema.MAX_CITAS_DIA</code> usando el <em>nombre de la clase</em>, no una variable de instancia. Y nota que el intento de Santiago de reasignar la constante falló. ¿Qué modificador causa cada uno de esos dos comportamientos?", "options": [{"letter": "A", "text": "<code>static</code> hace que el atributo pertenezca a la clase y no a cada instancia, permitiendo accederlo con el nombre de la clase. <code>final</code> restringe la asignación únicamente al momento de la declaración o al constructor: una vez que el constructor termina de ejecutarse, el valor queda bloqueado para ese objeto. Sin embargo, un método de instancia sí puede modificar el atributo <code>final</code> después del constructor si se usa reflexión o si la clase declara el modificador <code>volatile</code> en combinación. Por eso en SaludApp el intento de Santiago de asignar <code>MAX_CITAS_DIA = 999</code> desde un método exterior fallará si y solo si no hay un constructor que haya reasignado ese valor previamente. Si la clase <code>ConfiguracionSistema</code> tuviera un constructor que recibiera el límite como parámetro, esa asignación exterior sería válida porque el objeto aún estaría en fase de inicialización.", "correct": false}, {"letter": "B", "text": "El modificador <code>static</code> en Java no crea una única copia global del atributo: en entornos multihilo, la JVM genera automáticamente <strong>una copia del atributo estático por cada hilo de ejecución</strong> (thread-local copy) para evitar condiciones de carrera. Esto significa que en SaludApp, si dos usuarios acceden simultáneamente al sistema, cada uno verá su propia versión de <code>MAX_CITAS_DIA</code> sin interferencia. El modificador <code>final</code> complementa este comportamiento indicando a la JVM que la copia por hilo no puede ser reemplazada por otra referencia durante la ejecución del hilo, pero sí puede mutar su estado interno si el tipo lo permite — por ejemplo, si <code>MAX_CITAS_DIA</code> fuera una lista en lugar de un <code>int</code>, se le podrían agregar elementos sin problema. La combinación <code>static final</code> es la forma idiomática de declarar constantes thread-safe en Java.", "correct": false}, {"letter": "C", "text": "<code>static</code> hace que el atributo pertenezca a la <strong>clase</strong> y no a las instancias: existe una única copia en memoria compartida por todos los objetos y accesible directamente con el nombre de la clase, sin necesidad de crear ninguna instancia. <code>final</code> hace que el atributo sea <strong>inmutable</strong> tras su primera asignación: el compilador rechaza cualquier intento posterior de reasignación, sin excepciones — ni desde métodos, ni desde constructores de otras clases, ni desde el exterior. La combinación <code>static final</code> forma la <strong>constante de clase</strong>: un valor único, compartido e inmodificable que centraliza reglas de negocio críticas. Por convención Java, sus nombres se escriben en <code>MAYUSCULA_CON_GUIONES</code>. El intento de Santiago de asignar <code>MAX_CITAS_DIA = 999</code> falla en compilación porque <code>final</code> no admite ninguna excepción: el valor fue asignado en la declaración y eso es irrevocable.", "correct": true}]}, {"number": 13, "topic": "Sobrecarga de métodos en herencia", "scenario_paragraphs": ["En <strong>SaludApp</strong>, el equipo define una jerarquía de notificaciones. Existe una clase base <strong>Notificacion</strong> y una subclase <strong>NotificacionEmail</strong>. Valentina decide agregar variantes del método <code>enviar</code> para soportar distintos tipos de datos (texto, prioridad, etc.). Santiago asume que “al estar en una subclase” Java siempre escogerá el método “más específico” según el objeto real."], "code_blocks": [{"label": "Notificaciones.java", "code": "class Notificacion {\n    public void enviar(String msg) {\n        System.out.println(\"Base: \" + msg);\n    }\n}\n\nclass NotificacionEmail extends Notificacion {\n    public void enviar(Object msg) {\n        System.out.println(\"Email(Object): \" + msg);\n    }\n}\n\npublic class Demo {\n    public static void main(String[] args) {\n        Notificacion n = new NotificacionEmail();\n        n.enviar(\"Cita confirmada\");\n    }\n}"}], "quote": "", "quote_author": "", "question": "Con base en el código, ¿qué imprime el programa y por qué? Elige la afirmación que describe correctamente cómo se resuelve la llamada a <code>enviar(\"Cita confirmada\")</code> cuando existe <strong>sobrecarga</strong> en la subclase y el tipo de referencia es el de la clase base.", "hint": "en Java, <em>la sobrecarga</em> (mismo nombre, distinta firma) se decide con el tipo en compilación, mientras que <em>la sobrescritura</em> (misma firma exacta) se decide con el tipo real en ejecución.", "options": [{"letter": "A", "text": "Imprime <strong>Email(Object): Cita confirmada</strong> porque el objeto real es <code>NotificacionEmail</code> y Java siempre selecciona el método “más específico” en tiempo de ejecución, incluso cuando se trata de sobrecarga. Como <code>String</code> es un <code>Object</code>, la JVM decide usar el método de la subclase.", "correct": false}, {"letter": "B", "text": "Imprime <strong>Base: Cita confirmada</strong> porque el método de la clase base se ejecuta siempre que la variable sea del tipo base. Para que se ejecute el de la subclase, el método debe llamarse distinto o debe declararse <code>static</code>. La sobrecarga en herencia no es posible: Java la prohíbe para evitar ambigüedad.", "correct": false}, {"letter": "C", "text": "Imprime <strong>Base: Cita confirmada</strong>. La razón es que <strong>la sobrecarga se resuelve en compilación</strong> usando el tipo de la referencia (<code>Notificacion</code>) y la firma visible en esa clase. En <code>Notificacion</code> existe <code>enviar(String)</code>, así que esa es la llamada que queda “fijada” por el compilador. Como en la subclase <strong>no se sobrescribe</strong> (no existe <code>enviar(String)</code> allí), en ejecución no hay despacho dinámico hacia un override: se ejecuta el método heredado de la base.", "correct": true}]}, {"number": 14, "topic": "Clases final en Java", "scenario_paragraphs": ["En <strong>SaludApp</strong>, el equipo crea una clase para estandarizar el cifrado de tokens de sesión. Valentina quiere <strong>garantizar</strong> que nadie pueda crear variantes peligrosas cambiando el comportamiento mediante herencia, porque un override mal hecho podría debilitar la seguridad.", "Para evitarlo, propone declarar la clase como <code>final</code>:"], "code_blocks": [{"label": "SeguridadTokens.java", "code": "public final class TokenEncryptor {\n\n    public String encrypt(String raw) {\n        return \"ENC(\" + raw + \")\";\n    }\n}\n\n// Santiago intenta extenderla:\nclass TokenEncryptorDebil extends TokenEncryptor {\n    @Override\n    public String encrypt(String raw) {\n        return raw; // ← \"cifrado\" inexistente\n    }\n}"}], "quote": "", "quote_author": "", "question": "Considerando el código anterior, ¿cuál afirmación describe correctamente qué implica declarar una <strong>clase</strong> como <code>final</code> y qué efecto tiene sobre la herencia y la posibilidad de sobrescribir métodos?", "hint": "<code>final</code> en una <strong>clase</strong> afecta la <em>herencia</em> (no se puede extender). Es diferente a <code>final</code> en un <strong>método</strong> (no se puede sobrescribir) o en un <strong>atributo</strong> (no se puede reasignar).", "options": [{"letter": "A", "text": "Una clase <code>final</code> permite herencia, pero obliga a que los métodos de la subclase se llamen igual para “respetar” el contrato. Por eso, aunque Santiago extienda <code>TokenEncryptor</code>, Java compila y solo evita el <code>@Override</code> si el método no coincide exactamente.", "correct": false}, {"letter": "B", "text": "Declarar una clase como <code>final</code> significa que sus métodos se vuelven automáticamente <code>final</code>, por lo tanto nadie puede sobrescribirlos, pero sí se puede extender la clase para agregar métodos nuevos. En otras palabras: <code>final</code> bloquea overrides, pero no bloquea la herencia.", "correct": false}, {"letter": "C", "text": "Declarar una <strong>clase</strong> como <code>final</code> significa que <strong>no puede ser extendida</strong>. Por eso, cualquier intento de hacer <code>class TokenEncryptorDebil extends TokenEncryptor</code> produce un <strong>error de compilación</strong>. Al no existir subclases, tampoco es posible sobrescribir métodos en una subclase (porque la subclase no puede existir). Este patrón se usa cuando se quiere proteger el comportamiento de la clase (por ejemplo, por seguridad o estabilidad de la API).", "correct": true}]}, {"number": 15, "topic": "Composición de clases en Java", "scenario_paragraphs": ["En <strong>SaludApp</strong>, el equipo está construyendo la clase <strong>Paciente</strong>. Un paciente siempre tiene una dirección y un contacto de emergencia. Valentina propone modelar esto con <strong>composición</strong> (un objeto contiene a otros objetos) para mantener el diseño modular y fácil de evolucionar.", "El diseño propuesto es:", "class Direccion { String ciudad; String barrio; String detalle; } class ContactoEmergencia { String nombre; String telefono; } class Paciente { String id; String nombre; // Composición: el paciente \"tiene una\" dirección Direccion direccion; // Composición: el paciente \"tiene un\" contacto de emergencia ContactoEmergencia contacto; } “Si mañana cambia la estructura de la dirección (por ejemplo, agregamos <code>codigoPostal</code>), no quiero romper la jerarquía de herencia del paciente. Prefiero que el paciente <strong>contenga</strong> una dirección, no que <strong>sea</strong> una dirección.”"], "code_blocks": [{"label": "ModeloPacientes.java", "code": "class Direccion {\n    String ciudad;\n    String barrio;\n    String detalle;\n}\n\nclass ContactoEmergencia {\n    String nombre;\n    String telefono;\n}\n\nclass Paciente {\n    String id;\n    String nombre;\n\n    // Composición: el paciente \"tiene una\" dirección\n    Direccion direccion;\n\n    // Composición: el paciente \"tiene un\" contacto de emergencia\n    ContactoEmergencia contacto;\n}"}], "quote": "“Si mañana cambia la estructura de la dirección (por ejemplo, agregamos <code>codigoPostal</code>), no quiero romper la jerarquía de herencia del paciente. Prefiero que el paciente <strong>contenga</strong> una dirección, no que <strong>sea</strong> una dirección.”", "quote_author": "— Valentina, defendiendo composición sobre herencia", "question": "En el diseño mostrado, ¿cuál afirmación describe correctamente por qué <strong>Paciente</strong> usa <strong>composición</strong> con <code>Direccion</code> y <code>ContactoEmergencia</code>, y qué ventaja ofrece frente a intentar modelarlo con herencia?", "hint": "en composición, la relación típica es <em>“tiene un / tiene una”</em> (has-a), mientras que en herencia es <em>“es un / es una”</em> (is-a).", "options": [{"letter": "A", "text": "La composición se usa aquí porque <code>Direccion</code> y <code>ContactoEmergencia</code> son clases “más pequeñas”, y Java no permite heredar de más de una clase; por eso se “pegan” dentro de <code>Paciente</code>. En términos de comportamiento, composición y herencia son equivalentes: cualquier cosa que se haga con composición se puede lograr igual con herencia sin diferencias.", "correct": null}, {"letter": "B", "text": "La composición se usa solo cuando se quiere reutilizar código sin encapsulación. En este caso, sería mejor que <code>Paciente</code> heredara de <code>Direccion</code> para “tener” automáticamente ciudad y barrio, y además heredara de <code>ContactoEmergencia</code> para el teléfono. Si Java permitiera herencia múltiple, esa sería la opción ideal porque evita crear objetos adicionales.", "correct": null}, {"letter": "C", "text": "La relación correcta es <strong>“Paciente tiene una Dirección”</strong> y <strong>“Paciente tiene un Contacto de emergencia”</strong> (<em>has-a</em>), no <em>“Paciente es una Dirección”</em>. Con composición, <code>Direccion</code> y <code>ContactoEmergencia</code> quedan <strong>encapsuladas</strong> como partes del objeto, y se pueden evolucionar (agregar campos, validaciones o métodos) sin forzar una jerarquía de herencia artificial. Además, evita el acoplamiento y mantiene el modelo más flexible: el paciente puede cambiar de dirección o de contacto sin “romper” su identidad como paciente.", "correct": true}]}];

    let state = { correct: 0, wrong: 0, answered: new Set() };

    function escapeCode(text) {
        if (!text) return '';
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function renderQuiz() {
        const container = document.getElementById('quizContainer');
        const dots = document.getElementById('navDots');
        let html = '';
        let dotsHtml = '';

        QUIZ_DATA.forEach((q, idx) => {
            dotsHtml += '<div class="nav-dot" id="dot-' + idx + '" onclick="scrollToQ(' + idx + ')">' + q.number + '</div>';

            // Build scenario HTML
            let scenarioHtml = '';
            if (q.scenario_paragraphs.length > 0 || q.code_blocks.length > 0) {
                scenarioHtml += '<div class="scenario-section">';
                scenarioHtml += '<div class="scenario-label"><span class="icon-circle">📖</span> Escenario del caso</div>';

                // Render paragraphs, inserting code blocks after the paragraph that introduces them
                let codeIdx = 0;
                q.scenario_paragraphs.forEach((p, pi) => {
                    // Skip if it's basically a code dump (starts with code-like content)
                    const isCodeDump = (p.length > 50 && (p.startsWith('public ') || p.startsWith('//') || p.startsWith('class ') || p.startsWith('if ') || p.match(/^[A-Z][a-z]+\s+[a-z]+\s*=/) || p.match(/^\w+\s+\w+\s*=\s*new\s/)));

                    if (isCodeDump) {
                        // This paragraph is actually code that leaked into text - skip it
                        // The code block itself should follow
                    } else {
                        scenarioHtml += '<p class="scenario-p">' + p + '</p>';
                    }

                    // Check if next code block should follow this paragraph
                    const pLower = p.toLowerCase();
                    if (codeIdx < q.code_blocks.length &&
                        (pLower.includes('propone') || pLower.includes('código') || pLower.includes('escrib') ||
                            pLower.includes('punto de partida') || pLower.includes('diseño') || pLower.includes('centralizar') ||
                            pLower.includes('herencia') || pLower.includes('refactor') || pLower.includes('declarar') ||
                            pLower.includes('muestra') || pLower.includes('define') || pLower.includes('nota') ||
                            isCodeDump || pi === q.scenario_paragraphs.length - 1)) {
                        // Insert remaining code blocks
                        while (codeIdx < q.code_blocks.length) {
                            const cb = q.code_blocks[codeIdx];
                            scenarioHtml += '<div class="code-block">';
                            if (cb.label) {
                                scenarioHtml += '<div class="code-label">' + escapeCode(cb.label) + '</div>';
                            }
                            scenarioHtml += '<pre>' + escapeCode(cb.code) + '</pre>';
                            scenarioHtml += '</div>';
                            codeIdx++;

                            // Only insert one code block unless it's the last paragraph
                            if (pi < q.scenario_paragraphs.length - 1) break;
                        }
                    }
                });

                // Any remaining code blocks
                while (codeIdx < q.code_blocks.length) {
                    const cb = q.code_blocks[codeIdx];
                    scenarioHtml += '<div class="code-block">';
                    if (cb.label) scenarioHtml += '<div class="code-label">' + escapeCode(cb.label) + '</div>';
                    scenarioHtml += '<pre>' + escapeCode(cb.code) + '</pre>';
                    scenarioHtml += '</div>';
                    codeIdx++;
                }

                // Quote
                if (q.quote) {
                    scenarioHtml += '<div class="scenario-quote">';
                    scenarioHtml += '<p>' + q.quote + '</p>';
                    if (q.quote_author) {
                        scenarioHtml += '<div class="quote-author">' + q.quote_author + '</div>';
                    }
                    scenarioHtml += '</div>';
                }

                scenarioHtml += '</div>';
            }

            // Options
            let optionsHtml = '';
            q.options.forEach((opt, oi) => {
                optionsHtml += '<button class="option-btn" id="opt-' + idx + '-' + oi + '" onclick="selectOption(' + idx + ',' + oi + ')">' +
                    '<div class="letter-badge">' + opt.letter + '</div>' +
                    '<div class="opt-text">' + opt.text + '</div>' +
                    '</button>';
            });

            // Hint
            let hintHtml = '';
            if (q.hint) {
                hintHtml = '<button class="hint-toggle" onclick="toggleHint(' + idx + ')">💡 Ver pista</button>' +
                    '<div class="hint-content" id="hint-' + idx + '">' + q.hint + '</div>';
            }

            html += '<div class="q-card" id="qcard-' + idx + '" style="animation-delay:' + (idx * 0.04) + 's">' +
                '<div class="q-header">' +
                '<div class="q-number">' +
                '<div class="q-num-badge">' + q.number + '</div>' +
                '<div><div class="q-label">Pregunta ' + q.number + ' de 15</div><div class="q-topic">' + q.topic + '</div></div>' +
                '</div>' +
                '<div class="q-tag">☕ Java — POO</div>' +
                '</div>' +
                '<div class="q-body">' +
                scenarioHtml +
                '<div class="q-question-section">' +
                '<div class="q-question-label">Pregunta</div>' +
                '<div class="q-text">' + q.question + '</div>' +
                '</div>' +
                hintHtml +
                '<div class="options-list">' + optionsHtml + '</div>' +
                '<div class="feedback-area">' +
                '<button class="get-feedback-btn" id="fbBtn-' + idx + '" onclick="showFeedback(' + idx + ')">📝 Obtener retroalimentación</button>' +
                '<div class="feedback" id="feedback-' + idx + '"></div>' +
                '</div>' +
                '</div>' +
                '</div>';
        });

        dots.innerHTML = dotsHtml;
        container.innerHTML = html;
    }

    function toggleHint(idx) {
        document.getElementById('hint-' + idx).classList.toggle('show');
    }

    function selectOption(qIdx, optIdx) {
        if (state.answered.has(qIdx)) return;
        state.answered.add(qIdx);

        const q = QUIZ_DATA[qIdx];
        const selected = q.options[optIdx];
        const isCorrect = selected.correct;

        q.options.forEach((_, oi) => {
            document.getElementById('opt-' + qIdx + '-' + oi).classList.add('disabled');
        });

        const selBtn = document.getElementById('opt-' + qIdx + '-' + optIdx);
        selBtn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');

        if (!isCorrect) {
            q.options.forEach((o, oi) => {
                if (o.correct) document.getElementById('opt-' + qIdx + '-' + oi).classList.add('reveal-correct');
            });
        }

        document.getElementById('qcard-' + qIdx).classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
        document.getElementById('dot-' + qIdx).classList.add(isCorrect ? 'dot-correct' : 'dot-wrong');

        if (isCorrect) state.correct++; else state.wrong++;
        updateScore();

        document.getElementById('fbBtn-' + qIdx).classList.add('show');

        if (state.answered.size === QUIZ_DATA.length) {
            setTimeout(showResults, 600);
        }
    }

    function showFeedback(qIdx) {
        const q = QUIZ_DATA[qIdx];
        const fb = document.getElementById('feedback-' + qIdx);
        const btn = document.getElementById('fbBtn-' + qIdx);

        let selectedOpt = null;
        let correctOpt = null;
        q.options.forEach((o, oi) => {
            const el = document.getElementById('opt-' + qIdx + '-' + oi);
            if (el.classList.contains('selected-correct') || el.classList.contains('selected-wrong')) selectedOpt = o;
            if (o.correct) correctOpt = o;
        });

        const isCorrect = selectedOpt && selectedOpt.correct;
        let feedbackHtml = '';

        if (isCorrect) {
            feedbackHtml = '<div class="feedback-title">✅ ¡Correcto!</div>' +
                '<p><strong>¿Por qué es correcta?</strong> ' + correctOpt.text + '</p>';
        } else {
            feedbackHtml = '<div class="feedback-title">❌ Incorrecto</div>' +
                '<p><strong>Tu respuesta:</strong> ' + (selectedOpt ? selectedOpt.text : '') + '</p>' +
                '<hr>' +
                '<p><strong>✅ Respuesta correcta (' + correctOpt.letter + '):</strong> ' + correctOpt.text + '</p>';
        }

        fb.innerHTML = feedbackHtml;
        fb.className = 'feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
        btn.style.display = 'none';
    }

    function updateScore() {
        document.getElementById('correctCount').textContent = state.correct;
        document.getElementById('wrongCount').textContent = state.wrong;
        document.getElementById('pendingCount').textContent = QUIZ_DATA.length - state.answered.size;
        document.getElementById('progressFill').style.width = ((state.answered.size / QUIZ_DATA.length) * 100) + '%';
    }

    function showResults() {
        const card = document.getElementById('resultsCard');
        const pct = Math.round((state.correct / QUIZ_DATA.length) * 100);
        document.getElementById('finalScore').textContent = state.correct + '/' + QUIZ_DATA.length;

        let msg = '';
        if (pct === 100) msg = '🏆 ¡Perfecto! Dominas completamente estos conceptos de POO en Java.';
        else if (pct >= 80) msg = '🎉 ¡Excelente! Tienes un dominio sólido. Revisa los errores para perfeccionar.';
        else if (pct >= 60) msg = '👍 Buen trabajo. Repasa los temas donde fallaste para reforzar.';
        else if (pct >= 40) msg = '📚 Vas por buen camino, pero necesitas repasar varios conceptos. ¡Ánimo!';
        else msg = '💪 No te desanimes. Vuelve a estudiar los temas y repite el quiz.';

        document.getElementById('resultsMsg').textContent = msg;
        card.classList.add('show');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function resetQuiz() {
        state = { correct: 0, wrong: 0, answered: new Set() };
        renderQuiz();
        updateScore();
        document.getElementById('resultsCard').classList.remove('show');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function scrollToQ(idx) {
        document.getElementById('qcard-' + idx).scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    renderQuiz();
    updateScore();
</script>
</body>
